<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNHS | Track Your Concern</title>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --mnhs-maroon: #800000;
            --cream-bg: #FDF9F0;
            --font-copperplate: "Copperplate", "Copperplate Gothic Light", serif;
            --font-arimo: 'Arimo', sans-serif;
        }
        body { background-color: #ccc; margin: 0; display: flex; justify-content: center; font-family: var(--font-arimo); }
        .app-container {
            width: 100%; max-width: 414px; background-color: var(--cream-bg);
            min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }
        header { background-color: var(--mnhs-maroon); padding: 20px; color: white; text-align: center; }
        main { padding: 30px 20px; flex-grow: 1; text-align: center; }
        h1 { font-family: var(--font-copperplate); color: var(--mnhs-maroon); font-size: 1.5em; }
        .search-input {
            width: 80%; padding: 15px; border: 1px solid #dcd0b8; border-radius: 10px;
            font-size: 1.2em; text-align: center; margin-bottom: 20px; font-family: var(--font-copperplate);
        }
        .track-btn {
            background: linear-gradient(to right, #800, #b00);
            color: white; width: 85%; padding: 15px; border: none; border-radius: 30px;
            font-family: var(--font-copperplate); font-weight: bold; cursor: pointer;
        }
        #status-result {
            display: none; margin-top: 40px; padding: 20px; border-radius: 15px;
            background: white; border: 1px solid #dcd0b8; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .status-badge {
            display: inline-block; padding: 5px 15px; border-radius: 20px;
            font-size: 0.8em; font-weight: bold; margin-bottom: 10px;
        }
        /* Specific Status Colors */
        .pending-badge { background: #fff3cd; color: #856404; }
        .progress-badge { background: #cce5ff; color: #004085; }
        .resolved-badge { background: #d4edda; color: #155724; }

        footer { background-color: var(--mnhs-maroon); color: white; padding: 15px; text-align: center; font-size: 0.7em; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div style="font-family: var(--font-copperplate); letter-spacing: 1px;">TRACK CONCERN STATUS</div>
        </header>

        <main>
            <a href="index.html" style="color: var(--mnhs-maroon); text-decoration: none; display: block; text-align: left; margin-bottom: 20px;">← Back</a>
            
            <h1>ENTER CASE ID</h1>
            <p style="font-size: 0.8em; color: #666; margin-bottom: 30px;">Input the #ID number provided to you after submission.</p>

            <input type="text" id="caseIdInput" class="search-input" placeholder="#000">
            <button class="track-btn" onclick="trackCase()">TRACK STATUS</button>

            <div id="status-result">
                <p style="font-size: 0.9em; font-weight: bold; color: #333;">CASE STATUS FOR: <span id="display-id">#000</span></p>
                <div id="status-badge" class="status-badge">● LOADING...</div>
                <p id="status-desc" style="font-size: 0.75em; color: #666; line-height: 1.5;">
                    Fetching status...
                </p>
                <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
                <p style="font-size: 0.7em; color: #888;">Last updated: <span id="current-date"></span></p>
            </div>
        </main>

        <footer>
            🔒 Encrypted & Confidential System
        </footer>
    </div>

    
      <script>
    // Using your latest Deployment URL
    const scriptURL = 'https://script.google.com/macros/s/AKfycby1XD9LGuV3FkVOwhDz5TdAT4t5Grjr3If8NU4f5qSMc4Kpf7bG6KhoQHcaIYHq_FGG/exec';

    function trackCase() {
        const inputVal = document.getElementById('caseIdInput').value.trim();
        const resultBox = document.getElementById('status-result');
        const displayId = document.getElementById('display-id');
        const dateDisplay = document.getElementById('current-date');
        
        // Find the badge and description inside your layout
        const badge = document.querySelector('.status-badge');
        const desc = document.querySelector('#status-result p:nth-of-type(2)');

        if (!inputVal) {
            alert("Please enter a Case ID");
            return;
        }

        // Standardize format to match Spreadsheet (Column B)
        let searchId = inputVal.includes("ID-") ? inputVal : inputVal.replace("#", "ID-");
        
        // Initial Loading State
        resultBox.style.display = 'block';
        displayId.innerText = inputVal;
        badge.innerText = "● SEARCHING...";
        badge.style.background = "#fff3cd"; // Yellow while searching
        badge.style.color = "#856404";
        desc.innerText = "Connecting to MNHS database...";

        // The "doGet" request to your Apps Script
        fetch(`${scriptURL}?action=trackStatus&id=${searchId}`)
            .then(res => res.json())
            .then(data => {
                dateDisplay.innerText = data.date || new Date().toLocaleDateString();

                if(data.status === "Not Found") {
                    badge.innerText = "● NOT FOUND";
                    badge.style.background = "#f8d7da";
                    badge.style.color = "#721c24";
                    desc.innerText = "We couldn't find a record for this ID. Please double-check your entry.";
                } else {
                    // This pulls the REAL text from your spreadsheet Column E
                    const sheetStatus = data.status.toUpperCase();
                    badge.innerText = "● " + sheetStatus;

                    // Update UI based on the Spreadsheet Status
                    if (sheetStatus === "RESOLVED") {
                        badge.style.background = "#d4edda"; // Green
                        badge.style.color = "#155724";
                        desc.innerText = "Your concern has been addressed and resolved by the school administration. Thank you for your patience.";
                    } else if (sheetStatus === "IN PROGRESS") {
                        badge.style.background = "#cce5ff"; // Blue
                        badge.style.color = "#004085";
                        desc.innerText = "The administration is currently working on your concern. We will update you as soon as there is more progress.";
                    } else {
                        // Default Yellow for Pending/Under Review
                        badge.style.background = "#fff3cd";
                        badge.style.color = "#856404";
                        desc.innerText = "Your concern has been received by the Principal's Office. We are currently evaluating the details.";
                    }
                }
            })
            .catch(err => {
                console.error(err);
                badge.innerText = "● ERROR";
                badge.style.background = "#f8d7da";
                desc.innerText = "Connection failed. Please ensure you have deployed the script as a 'Web App' with access set to 'Anyone'.";
            });
    }
</script>
</body>
</html>
